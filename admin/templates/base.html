<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VPN Admin{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e4e7; }
    nav { background: #1a1d27; padding: 1rem 2rem; display: flex; gap: 1.5rem; border-bottom: 1px solid #2a2d3a; }
    nav a { color: #a1a1aa; text-decoration: none; }
    nav a:hover { color: #fff; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 1.25rem; text-align: center; }
    .stat .num { font-size: 2rem; font-weight: 700; color: #6366f1; }
    .stat .label { color: #a1a1aa; margin-top: 0.25rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #2a2d3a; }
    th { color: #a1a1aa; font-weight: 500; }
    input, select { background: #0f1117; border: 1px solid #2a2d3a; color: #e4e4e7; padding: 0.5rem 0.75rem; border-radius: 6px; width: 100%; margin-bottom: 0.75rem; }
    button { background: #6366f1; color: #fff; border: none; padding: 0.6rem 1.25rem; border-radius: 6px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    .error { color: #f87171; margin-bottom: 1rem; }
    .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
    .badge-online { background: #065f46; color: #6ee7b7; }
    .badge-offline { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  {% block nav %}{% endblock %}
  <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
